---
- name: Get vCenter info
  command: govc about
  environment:
    GOVC_URL: "{{ vcenter_hostname }}"
    GOVC_USERNAME: "{{ vcenter_username }}"
    GOVC_PASSWORD: "{{ vcenter_password }}"
    GOVC_INSECURE: "1"
- name: change macaddress for ip
  shell: govc vm.network.change -vm="{{ vm_name|upper}}" -net="{{vcenter_network}}" -net.address="{{macaddress}}" ethernet-0
  environment:
    GOVC_URL: "{{ vcenter_hostname }}"
    GOVC_USERNAME: "{{ vcenter_username }}"
    GOVC_PASSWORD: "{{ vcenter_password }}"
    GOVC_INSECURE: "1"
- name: change macaddress for ip
  shell: govc device.connect -vm "{{ vm_name|upper}}" ethernet-0
  environment:
    GOVC_URL: "{{ vcenter_hostname }}"
    GOVC_USERNAME: "{{ vcenter_username }}"
    GOVC_PASSWORD: "{{ vcenter_password }}"
    GOVC_INSECURE: "1"
- name: get vm devices
  command: govc device.ls -vm "{{ vm_name|upper}}"
  register: vm_devices
  changed_when: false
  environment:
    GOVC_URL: "{{ vcenter_hostname }}"
    GOVC_USERNAME: "{{ vcenter_username }}"
    GOVC_PASSWORD: "{{ vcenter_password }}"
    GOVC_INSECURE: "1"
- name: change sdrom connected
  command:
    argv:
      - govc
      - device.connect
      - -vm
      - "{{ vm_name|upper}}"
      - "{{ ((vm_devices.stdout_lines | select('match', '^cdrom-') | list | first).split()[0]) }}"
  when: (vm_devices.stdout_lines | select('match', '^cdrom-') | list | length) > 0
  environment:
    GOVC_URL: "{{ vcenter_hostname }}"
    GOVC_USERNAME: "{{ vcenter_username }}"
    GOVC_PASSWORD: "{{ vcenter_password }}"
    GOVC_INSECURE: "1"
- name: vm disk.enableUUID
  shell: govc vm.change -e="disk.enableUUID=1" -vm="{{vmfolder}}{{vm_name|upper}}"
  environment:
    GOVC_URL: "{{ vcenter_hostname }}"
    GOVC_USERNAME: "{{ vcenter_username }}"
    GOVC_PASSWORD: "{{ vcenter_password }}"
    GOVC_INSECURE: "1"
